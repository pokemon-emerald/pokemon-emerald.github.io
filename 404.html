<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Pokemon Emerald Online</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://pokemon-emerald.github.io/" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #00c853; --green2: #00e676;
      --dark: #060d06; --gold: #ffd600;
      --muted: #7aab7a; --text: #d4f5d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .code {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(48px, 12vw, 96px);
      color: var(--green2);
      text-shadow: 0 0 30px var(--green), 0 0 80px rgba(0,200,83,.3);
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.5vw, 16px);
      color: var(--gold); margin-bottom: 18px;
    }
    p { font-size: 16px; color: var(--muted); max-width: 460px; line-height: 1.7; margin-bottom: 32px; }
    a {
      font-family: 'Press Start 2P', monospace; font-size: 10px;
      background: var(--green); color: #000;
      padding: 14px 28px; border-radius: 3px; text-decoration: none;
      box-shadow: 0 0 16px rgba(0,200,83,.4), 4px 4px 0 #00701e;
      transition: transform .12s;
      display: inline-block;
    }
    a:hover { transform: translateY(-2px); }
    .sprite { font-size: 64px; margin-bottom: 16px; animation: bounce 1s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  </style>
</head>
<body>
  <div class="sprite">❓</div>
  <div class="code">404</div>
  <h1>Wild Page Not Found!</h1>
  <p>The page you're looking for fled into the tall grass. Head back to the main site and continue your Pokémon Emerald adventure.</p>
  <a href="https://pokemon-emerald.github.io/">▶ Return to Home</a>
</body>
</html>
